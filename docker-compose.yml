# docker-compose.yml — Ginie Canton local dev stack
#
# Usage:
#   docker compose up -d              # Start all services
#   docker compose up -d postgres redis  # Infra only (run backend locally)
#   docker compose down                # Stop
#   docker compose down -v             # Stop + delete data volumes
#
# Canton sandbox runs OUTSIDE Docker (needs local Daml SDK).
# Start it separately: ./scripts/start-canton-sandbox.ps1

services:
  postgres:
    image: postgres:16-alpine
    container_name: ginie-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: ${CANTON_DB_PASSWORD:-password}
      POSTGRES_USER: ${CANTON_DB_USER:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/scripts/init_databases.sh:/docker-entrypoint-initdb.d/00-init-databases.sh
      - ./backend/scripts/init_db.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ginie-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ginie-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env.ginie
    environment:
      DATABASE_URL: postgresql://${CANTON_DB_USER:-postgres}:${CANTON_DB_PASSWORD:-password}@postgres:5432/ginie_daml
      REDIS_URL: redis://redis:6379/0
      CANTON_SANDBOX_URL: http://host.docker.internal:7575
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
