name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: password
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest

      - name: Lint (ruff)
        working-directory: backend
        run: ruff check . --select E,W,F --ignore E501

      - name: Unit tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/ginie_daml
          REDIS_URL: redis://localhost:6379/0
          CANTON_ENVIRONMENT: sandbox
          CANTON_SANDBOX_URL: http://localhost:7575
          LLM_PROVIDER: openai
          LLM_MODEL: gpt-4o
        run: pytest tests/test_agents.py -v --tb=short

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Frontend lint
        working-directory: frontend_dark
        run: |
          npm ci
          npx next lint
